<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Try-On</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Virtual Try-On</h1>
      <p class="tagline">Upload a photo of a person and a clothing item — AI generates the try-on result</p>
    </header>

    <!-- API Key Section -->
    <div class="api-key-bar" id="api-key-bar">
      <label for="api-key-input">fal.ai API Key:</label>
      <input type="password" id="api-key-input" placeholder="your-fal-ai-key">
      <button class="btn btn-sm" id="save-key-btn">Save</button>
      <span class="key-status" id="key-status"></span>
      <a href="https://fal.ai/dashboard/keys" target="_blank" class="key-link">Get a key</a>
    </div>

    <main class="main-content">
      <!-- Upload Cards -->
      <div class="upload-row">
        <!-- Person Photo -->
        <div class="upload-card" id="person-card">
          <div class="upload-preview" id="person-preview">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>Upload Person Photo</span>
          </div>
          <img id="person-img" class="preview-img hidden" alt="Person photo">
          <label class="upload-overlay" for="person-upload">
            <span>Click or drag to upload</span>
          </label>
          <input type="file" id="person-upload" accept="image/*" hidden>
          <button class="clear-btn hidden" id="clear-person" title="Remove">&times;</button>
        </div>

        <!-- Clothing Photo -->
        <div class="upload-card" id="clothing-card">
          <div class="upload-preview" id="clothing-preview">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 2l3 2.5L12 2l3 2.5L18 2v6l-2 1v13H8V9L6 8V2z"/>
            </svg>
            <span>Upload Clothing Photo</span>
          </div>
          <img id="clothing-img" class="preview-img hidden" alt="Clothing photo">
          <label class="upload-overlay" for="clothing-upload">
            <span>Click or drag to upload</span>
          </label>
          <input type="file" id="clothing-upload" accept="image/*" hidden>
          <button class="clear-btn hidden" id="clear-clothing" title="Remove">&times;</button>
        </div>
      </div>

      <!-- Options Row -->
      <div class="options-row">
        <div class="option-group">
          <label for="cloth-type-select">Clothing Type</label>
          <select id="cloth-type-select">
            <option value="overall">Full Outfit</option>
            <option value="upper_body">Upper Body (Tops, Jackets)</option>
            <option value="lower_body">Lower Body (Pants, Skirts)</option>
          </select>
        </div>
        <div class="option-group">
          <label for="num-images-select">Number of Results</label>
          <select id="num-images-select">
            <option value="1">1 Image</option>
            <option value="2">2 Images</option>
            <option value="3">3 Images</option>
            <option value="4" selected>4 Images</option>
          </select>
        </div>
      </div>

      <!-- Generate Button -->
      <div class="generate-section">
        <button class="btn btn-primary btn-lg" id="generate-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Generate Try-On
        </button>
        <p class="generate-hint" id="generate-hint">Upload both images to enable generation</p>
      </div>

      <!-- Loading State -->
      <div class="loading-section hidden" id="loading-section">
        <div class="spinner"></div>
        <p class="loading-text">Generating your virtual try-on...</p>
        <p class="loading-subtext">This typically takes 30-60 seconds per image</p>
      </div>

      <!-- Result Section -->
      <div class="result-section hidden" id="result-section">
        <h2>Results</h2>
        <div class="result-gallery" id="result-gallery">
          <!-- Images injected by JS -->
        </div>
        <div class="result-actions">
          <button class="btn btn-primary" id="download-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Selected
          </button>
          <button class="btn btn-secondary" id="download-all-btn">Download All</button>
          <button class="btn btn-secondary" id="try-again-btn">Try Another</button>
        </div>
      </div>

      <!-- Error State -->
      <div class="error-section hidden" id="error-section">
        <p class="error-text" id="error-text"></p>
        <button class="btn btn-secondary" id="dismiss-error-btn">Dismiss</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
