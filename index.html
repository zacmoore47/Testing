<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Try-On</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <h1>Virtual Try-On</h1>
      <p>See how any outfit looks on you</p>
    </header>

    <!-- API Key (compact) -->
    <div class="key-bar">
      <input type="password" id="api-key-input" placeholder="fal.ai API key">
      <button id="save-key-btn">Save</button>
      <span class="key-status" id="key-status"></span>
      <a href="https://fal.ai/dashboard/keys" target="_blank">Get a key</a>
    </div>

    <!-- Steps -->
    <main class="steps">

      <!-- Step 1: Face -->
      <section class="step">
        <div class="step-label"><span class="step-num">1</span> Your face</div>
        <div class="face-upload" id="face-card">
          <img id="face-img" class="face-preview hidden" alt="Face">
          <div class="face-placeholder" id="face-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            </svg>
            <span>Upload a photo of your face</span>
          </div>
          <input type="file" id="face-upload" accept="image/*" hidden>
          <button class="remove-btn hidden" id="clear-face">&times;</button>
        </div>
      </section>

      <!-- Step 2: Body measurements -->
      <section class="step">
        <div class="step-label"><span class="step-num">2</span> Body details</div>
        <div class="body-form">
          <div class="field-row">
            <div class="field">
              <label for="gender-select">I am</label>
              <select id="gender-select">
                <option value="man">Male</option>
                <option value="woman">Female</option>
              </select>
            </div>
            <div class="field">
              <label for="body-type-select">Build</label>
              <select id="body-type-select">
                <option value="slim">Slim</option>
                <option value="average" selected>Average</option>
                <option value="athletic">Athletic</option>
                <option value="muscular">Muscular</option>
                <option value="curvy">Curvy</option>
                <option value="plus-size">Plus-size</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Height</label>
              <div class="height-inputs">
                <select id="height-ft">
                  <option value="4">4 ft</option>
                  <option value="5" selected>5 ft</option>
                  <option value="6">6 ft</option>
                  <option value="7">7 ft</option>
                </select>
                <select id="height-in">
                  <option value="0">0 in</option>
                  <option value="1">1 in</option>
                  <option value="2">2 in</option>
                  <option value="3">3 in</option>
                  <option value="4">4 in</option>
                  <option value="5">5 in</option>
                  <option value="6">6 in</option>
                  <option value="7">7 in</option>
                  <option value="8" selected>8 in</option>
                  <option value="9">9 in</option>
                  <option value="10">10 in</option>
                  <option value="11">11 in</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="weight-input">Weight (lbs)</label>
              <input type="number" id="weight-input" value="150" min="60" max="500">
            </div>
          </div>
        </div>
      </section>

      <!-- Step 3: Clothing -->
      <section class="step">
        <div class="step-label"><span class="step-num">3</span> Clothing item</div>
        <div class="clothing-row">
          <div class="clothing-upload" id="clothing-card">
            <img id="clothing-img" class="clothing-preview hidden" alt="Clothing">
            <div class="clothing-placeholder" id="clothing-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M6 2l3 2.5L12 2l3 2.5L18 2v6l-2 1v13H8V9L6 8V2z"/>
              </svg>
              <span>Upload clothing photo</span>
            </div>
            <input type="file" id="clothing-upload" accept="image/*" hidden>
            <button class="remove-btn hidden" id="clear-clothing">&times;</button>
          </div>
          <div class="clothing-options">
            <div class="field">
              <label for="cloth-type-select">Type</label>
              <select id="cloth-type-select">
                <option value="overall">Full outfit</option>
                <option value="upper">Top / Jacket</option>
                <option value="lower">Pants / Skirt</option>
              </select>
            </div>
            <div class="field">
              <label for="num-images-select">Variations</label>
              <select id="num-images-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Generate -->
      <div class="generate-area">
        <button class="btn-generate" id="generate-btn" disabled>Generate Try-On</button>
        <p class="hint" id="generate-hint">Upload a face and clothing to start</p>
      </div>

      <!-- Loading -->
      <div class="loading hidden" id="loading-section">
        <div class="loader"></div>
        <p id="loading-status">Creating your mannequin...</p>
        <p class="loading-sub">This may take a minute or two</p>
      </div>

      <!-- Results -->
      <section class="results hidden" id="result-section">
        <div class="step-label">Results</div>
        <div class="gallery" id="result-gallery"></div>
        <div class="result-actions">
          <button class="btn-primary" id="download-btn">Download selected</button>
          <button class="btn-secondary" id="download-all-btn">Download all</button>
          <button class="btn-secondary" id="try-again-btn">Try another</button>
        </div>
      </section>

      <!-- Error -->
      <div class="error-box hidden" id="error-section">
        <p id="error-text"></p>
        <button class="btn-secondary" id="dismiss-error-btn">Dismiss</button>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
